name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile source
        run: python -m compileall -q src scripts

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run dry-run example
        run: PYTHONPATH=src python -m kpa dry-run examples/listings.example.json

      - name: Secret scan
        run: python scripts/secret_scan.py .

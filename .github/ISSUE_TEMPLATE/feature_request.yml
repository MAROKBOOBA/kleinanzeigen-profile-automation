name: Feature request
description: Suggest an improvement that keeps the no-login-automation policy intact.
title: "feature: "
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests that automate login, credentials, 2FA, captcha, phone, identity, payment, proxy/fingerprint, or anti-detection behavior will be closed.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true
  - type: checkboxes
    id: policy
    attributes:
      label: Safety policy fit
      options:
        - label: This request does not automate login, passwords, 2FA, captchas, phone, identity, payment, cookies, sessions, proxy rotation, fingerprinting, or detection evasion.
          required: true
